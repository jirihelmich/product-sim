<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/app.css">
</head>
<body>
  <div id="app">
    <nav id="nav">
      <div class="nav-brand">
        <span class="brand-icon">📊</span>
        <span id="product-name">Product Simulator</span>
      </div>
      <div class="nav-tabs">
        <a href="#home" class="nav-tab" data-route="home">Home</a>
        <a href="#dashboard" class="nav-tab" data-route="dashboard">Dashboard</a>
        <a href="#decide" class="nav-tab" data-route="decide">Decide</a>
        <a href="#results" class="nav-tab" data-route="results">Results</a>
        <a href="#vanity-game" class="nav-tab" data-route="vanity-game">Games</a>
      </div>
      <div class="nav-meta">
        <span id="team-badge" class="pill" style="display:none;">Team <span id="team-name">?</span></span>
        <span id="round-badge" class="pill pill-purple">Round <span id="round-num">1</span>/4</span>
      </div>
    </nav>

    <main id="main">
      <!-- Views injected here by router -->
      <div id="view-loading" class="view">
        <div class="center-message">
          <h2>Loading dataset...</h2>
        </div>
      </div>
    </main>
  </div>

  <script src="src/js/dataset.js"></script>
  <script src="src/js/state.js"></script>
  <script src="src/js/router.js"></script>
  <script src="src/js/views/home.js"></script>
  <script src="src/js/views/dashboard.js"></script>
  <script src="src/js/views/decide.js"></script>
  <script src="src/js/views/results.js"></script>
  <script src="src/js/views/vanity-game.js"></script>
  <script src="src/js/views/pvalue-game.js"></script>
  <script src="src/js/views/scoring.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
